name: Generate Snapshot

# Phase 0 spike: prove a full `init` (boot L1/L2/L3 + build deployer images +
# host token-bridge-contracts deploy + capture) runs end-to-end on a GitHub
# runner. Once proven, this grows into the matrixed snapshot generator.
on:
  # TEMPORARY (Phase 0 spike): branch-scoped push trigger so the workflow runs
  # before it exists on the default branch. Remove before merge.
  push:
    branches:
      - ci/generate-snapshots
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant label (used for the capture id / artifact name)"
        required: true
        default: "l3-custom-6"
        type: string
      fee-token-decimals:
        description: "Custom fee token decimals (empty for ETH gas)"
        required: false
        default: "6"
        type: string
      nitro-contracts-version:
        description: "Nitro contracts version"
        required: true
        default: "v2.1"
        type: choice
        options:
          - v2.1
          - v3.2
      capture-id:
        description: "Snapshot id to capture under"
        required: true
        default: "l3-custom-6-v2.1"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
      packages: write
    env:
      # init resolves token-bridge-contracts to <repo-parent>/token-bridge-contracts
      # by default; pin it explicitly so the location is unambiguous.
      TOKEN_BRIDGE_LOCAL_DIR: ${{ github.workspace }}/../token-bridge-contracts
      # Pinned to the commit the contract-deployer Dockerfiles use.
      TOKEN_BRIDGE_COMMIT: 5975d8f7360816341be7f94fd333ef240f4aec23
      # Fallbacks so the spike's push trigger works without dispatch inputs.
      DECIMALS: ${{ inputs.fee-token-decimals || '6' }}
      NC_VERSION: ${{ inputs.nitro-contracts-version || 'v2.1' }}
      CAPTURE_ID: ${{ inputs.capture-id || 'l3-custom-6-v2.1' }}
      VARIANT: ${{ inputs.variant || 'l3-custom-6' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Foundry (forge for token-bridge build)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install yarn (classic)
        run: npm install -g yarn@1.22.22

      - name: Prepare token-bridge-contracts host checkout
        run: |
          set -euxo pipefail
          mkdir -p "$TOKEN_BRIDGE_LOCAL_DIR"
          cd "$TOKEN_BRIDGE_LOCAL_DIR"
          git init .
          git remote add origin https://github.com/OffchainLabs/token-bridge-contracts.git
          git fetch --depth 1 origin "$TOKEN_BRIDGE_COMMIT"
          git checkout --detach FETCH_HEAD
          yarn install --frozen-lockfile
          yarn build
          test -f node_modules/ts-node/dist/bin.js
          test -f scripts/deployment/deployTokenBridgeCreator.ts

      - name: Docker sanity
        run: docker version && docker compose version

      # Run init with retries. init is flaky in CI: it intermittently exits 0
      # the instant `wait-l1` starts, before capturing (event-loop/race on the
      # runner, ~50%). So we don't trust init's exit code — success = the
      # manifest exists. --rebuild resets runtime between attempts. We pass
      # --skip-post-capture-verify because the in-place verify-restart's fixed
      # 120s RPC budget is too tight for a cold runner; the bundle is validated
      # the real way below (pack + checksum, then image build).
      - name: Run init (retry until snapshot captured)
        run: |
          set -uo pipefail
          MANIFEST="config/snapshots/$CAPTURE_ID/manifest.json"
          DEC_FLAG=""
          if [ -n "${DECIMALS:-}" ]; then DEC_FLAG="--fee-token-decimals $DECIMALS"; fi
          max=3
          for attempt in $(seq 1 "$max"); do
            echo "::group::init attempt $attempt/$max"
            # shellcheck disable=SC2086
            pnpm dev init \
              --nitro-contracts-version "$NC_VERSION" \
              $DEC_FLAG \
              --capture-id "$CAPTURE_ID" \
              --rebuild \
              --skip-post-capture-verify || echo "init exited non-zero on attempt $attempt"
            echo "::endgroup::"
            if [ -f "$MANIFEST" ]; then
              echo "snapshot captured on attempt $attempt"
              break
            fi
            echo "attempt $attempt produced no snapshot; resetting and retrying"
            docker compose -f docker/docker-compose.yaml -p arbitrum-testnode down -v || true
          done
          test -f "$MANIFEST"

      - name: Assert snapshot captured
        run: |
          set -euxo pipefail
          test -f "config/snapshots/$CAPTURE_ID/manifest.json"
          echo "--- manifest ---"
          cat "config/snapshots/$CAPTURE_ID/manifest.json"

      # Pack into release assets (the exact .tgz + .sha256 the publish workflow
      # installs). Proves the bundle is producible and correctly named in CI.
      - name: Pack snapshot
        run: >-
          pnpm dev snapshot pack
          --id "$CAPTURE_ID"
          --tag "$CAPTURE_ID"
          --out-dir "$RUNNER_TEMP/snapshots"

      - name: Assert release assets present + checksum valid
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/snapshots"
          ls -la
          test -f "arbitrum-testnode-snapshot-$CAPTURE_ID.tgz"
          test -f "arbitrum-testnode-snapshot-$CAPTURE_ID.sha256"
          sha256sum -c "arbitrum-testnode-snapshot-$CAPTURE_ID.sha256"

      # Prove the full inline path: build + push a testnode IMAGE from the
      # freshly-init'd snapshot (the goal — images per variant, no separate
      # snapshot release). Throwaway tag so no real release artifact is touched.
      - name: Prepare testnode context
        run: >-
          node scripts/ci/prepare-testnode-context.mjs
          --variant "$VARIANT"
          --snapshot-id "$CAPTURE_ID"
          --nitro-contracts-version "$NC_VERSION"

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Contracts tag
        id: nc
        run: echo "tag=nc$(echo "$NC_VERSION" | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push testnode image (spike tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/testnode.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.lower.outputs.owner }}/arbitrum-testnode-ci:spike-${{ github.sha }}-${{ steps.nc.outputs.tag }}-${{ env.VARIANT }}

      - name: Upload snapshot artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ env.CAPTURE_ID }}
          path: config/snapshots/${{ env.CAPTURE_ID }}
          retention-days: 7

      - name: Dump docker state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker compose -f docker/docker-compose.yaml -p arbitrum-testnode logs --tail=100 || true

      - name: Upload init state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: init-debug-${{ env.CAPTURE_ID }}
          path: |
            config/state.json
            config/*.json
            config/runs/**
          retention-days: 7
          if-no-files-found: ignore
